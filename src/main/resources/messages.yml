#вңҚвңҚвңҚвңҚ This file handles all messages for the plugin including the prefix.вңҚвңҚвңҚвңҚ
#вңҚвңҚвңҚвңҚ You can change anything here to be whatever custom stuff you want.вңҚвңҚвңҚвңҚ
#вҳ вҳ вҳ вҳ  DO NOT CHANGE THE "Messages:" line as this will break the plugin.вҳ вҳ вҳ вҳ 
#вҳ вҳ вҳ вҳ  ALL messages must have single quotes '' as seen in this default config.вҳ вҳ вҳ вҳ 

#рҹ“қрҹ“қрҹ“қрҹ“қ Placeholders рҹ“қрҹ“қрҹ“қрҹ“қ


#Plugin prefix is sent before ALL messages in the plugin.
Messages:
  #Plugin prefix for all messages.
  Prefix: '&eStaff Utils &7> '

  #вһівһівһівһівһі Player Messages вһівһівһівһівһі
  #No permission to use /fly command
  No-Permission: '&4ERROR: &cYou do not have permission to use this command'

  #вһівһівһівһівһі Bhop Messages вһівһівһівһівһі
  #Bhop enabled
  Bhop-Enabled: '&bBunny hopping has been &2&lEnabled'

  #Bhop disabled
  Bhop-Disabled: '&bBunny hopping has been &4&lDisabled'

  #вһівһівһівһівһі Freeze Messagesвһівһівһівһівһі

  #Target player not found. (This will be sent if either the player is not online or is not a real player)
  Freeze-Target-Not-Found: '&cError &4&l%playerName% &cnot found'

  #Target player is now frozen
  Freeze-Enabled-On-Target: '&aYou have frozen &2&l%playerName%'

  #Target player is now unfrozen
  Freeze-Disabled-On-Target: '&aYou have unfrozen &2&l%playerName%'

  #вҳ вҳ вҳ вҳ  The following messages are sent to the target player who you have frozen.
  #Target player is now frozen
  Target-Freeze-Message: '&c&lYou have been frozen by a staff member. &4&lIf you log out you will be banned'

  #Target player is now unfrozen
  Target-Un-Freeze-Message: '&2&lYou have been released by a staff member'

  #вһівһівһівһівһі Spectate Messagesвһівһівһівһівһі

  #If the player only uses /spectate
  Spectate-Not-Enough-Args: '&4Error You did not supply a players name'

  #Target player not found. (This will be sent if either the player is not online or is not a real player)
  Spectate-Target-Not-Found: '&cError &4&l%playerName% &cnot found'

  #Message that is sent to the player when they begin spectating someone.
  Spectate-Enabled: '&6You have began spectating &e%playerName%'

  #Message that is sent to the player when they stop spectating someone.
  Spectate-Disabled: '&6You are no longer spectating a player'

  #вһівһівһівһівһі WelcomeBack Messagesвһівһівһівһівһі

  #If the player only uses /WelcomeBack
  WelcomeBack-Not-Enough-Args: '&4Error You did not supply a players name'

  #Target player not found. (This will be sent if either the player is not online or is not a real player)
  WelcomeBack-Target-Not-Found: '&cError &4&l%playerName% &cnot found'

  #Message that is broadcast to the server when someone uses /WelcomeBack <%playerName%>
  WelcomeBack-Message: '&b&lWelcome Back &a%playerName% &6To Ragnarok'

  #вһівһівһівһівһі Xray Messages Messagesвһівһівһівһівһі

  #Message that is sent to the player when they enable /xray.
  Xray-Enabled: '&b&lXray &2Enabled'

  #Message that is sent to the player when they disable /xray.
  Xray-Disabled: '&b&lXray &4Disabled'






  #вһівһівһівһівһі Admin Messages вһівһівһівһівһі

  #This is the admin help menu. (This runs A->Z)
  Help-Header: '&e----- &eStaff Utils &e-----'
  Help-A: '&6&lHelp menu'
  Help-B: '&6To get back here use /Staffutils help'
  Help-C: '&6/Staffutils reload &7-> &eReloads plugin configuration files'
  Help-D: '&6/DragonFly toggle <playerName> &7-> &eToggles specified players flight'
  Help-E: '&6/DragonFly adminfly &7-> &eToggles free admin flight'
  Help-Footer: '&e----- &eStaff Utils &e-----'

  #This is sent if someone has dragonFly.Admin and they just type /dragonfly
  Help-Trigger: '&5ADMIN &4ERROR: &cNot enough command arguments. &ePlease use /dragonfly help'


#See config.yml for permissions, and other plugin configurations
