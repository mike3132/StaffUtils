#вңҚвңҚвңҚвңҚвңҚPermissionsвңҚвңҚвңҚвңҚвңҚ
#staffUtils.Bhop > Enables / Disables bunny hopping
#staffUtils.Freeze  > Enables / Disables freeze on players
#staffUtils.LogoutWhileFrozen > Sends a message when someone logs out while frozen
#staffUtils.WelcomeBack > Welcomeback a player with a custom message
#staffUtils.Xray > Enables / Disables xray
#staffUtils.Admin > Access to all admin commands


#вңҚвңҚвңҚвңҚвңҚPermissionsвңҚвңҚвңҚвңҚвңҚ

#####You can Modify the following how you wish#####

#вҷўвҷўвҷўвҷўвҷўBhop Sectionвҷўвҷўвҷўвҷўвҷў

#If this is set to true when someone uses /bhop they will be given a boss bar.
bhopBossBar: true

#This is what the boss bar will say if it's enabled
#вҳ вҳ вҳ вҳ You have to restart the server for title to changeвҳ вҳ вҳ вҳ 
bhopBossBarTitle: '&2Bunny &aHopping'

#вҷўвҷўвҷўвҷўвҷўSpectate Sectionвҷўвҷўвҷўвҷўвҷў

#If this is set to true when someone uses /spectate they will be given a boss bar.
spectateBossBar: true

#This is what the boss bar will say if it's enabled
#вҳ вҳ вҳ вҳ You have to restart the server for title to changeвҳ вҳ вҳ вҳ 
spectateBossBarTitle: '&6&lSpectating'



#вҷўвҷўвҷўвҷўвҷўXray Sectionвҷўвҷўвҷўвҷўвҷў

#вңҚвңҚвңҚвңҚвңҚ These are the blocks that will be shown when someone uses /xray (Anything not in this list will be hidden)вңҚвңҚвңҚвңҚвңҚ
#вҳ вҳ вҳ вҳ  You must use all capital letters, and DO NOT MODIFY "XrayBlocks" it will break the plugin.вҳ вҳ вҳ вҳ 
#рҹ“қрҹ“қрҹ“қрҹ“қ For a full list of blocks see <https://hub.spigotmc.org/javadocs/bukkit/org/bukkit/Material.html>рҹ“қрҹ“қрҹ“қрҹ“қ

#If this is set to true then when someone uses /xray they will be given night vision.
nightVision: true

#If this is set to true when someone uses /xray they will be given a boss bar.
xrayBossBar: true

#This is what the boss bar will say if it's enabled
#вҳ вҳ вҳ вҳ You have to restart the server for this to take effect and change#вҳ вҳ вҳ вҳ 
xrayBossBarTitle: '&b&lXraying'

